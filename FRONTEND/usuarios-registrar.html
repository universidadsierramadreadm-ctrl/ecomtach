<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECOMATCH — Nuevo Usuario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <div class="logo-icon">
          <a href="inicio.html"><img src="assets/images/logo.png" alt="ECOMATCH" height="52" /></a>
        </div>
      </div>
      <div class="module-nav">
        <span class="module-nav-user">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="nombreNav"></span>
        </span>
        <button class="btn-nav-logout" onclick="cerrarSesion()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Salir
        </button>
      </div>
    </div>
  </nav>

  <div class="page-wrap narrow">

    <a href="usuarios.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver a usuarios
    </a>

    <h1 class="page-title" style="margin-bottom:16px;">Nuevo Usuario</h1>

    <div class="admin-notice" style="margin-bottom:24px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Esta acción requiere rol <strong>admin</strong>.
    </div>

    <div class="form-card">
      <div id="alerta" class="alerta"></div>

      <form onsubmit="event.preventDefault(); registrar()">

        <div class="form-row">
          <div class="form-field">
            <label for="inputNombre">Nombre completo *</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
              <input type="text" id="inputNombre" placeholder="Ej. Juan García" autofocus />
            </div>
          </div>
          <div class="form-field">
            <label for="inputEmpresa">Empresa</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
              </span>
              <input type="text" id="inputEmpresa" placeholder="Nombre de la empresa" />
            </div>
          </div>
        </div>

        <div class="form-field">
          <label for="inputEmail">Correo electrónico *</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="inputEmail" placeholder="correo@empresa.com" />
          </div>
        </div>

        <div class="form-field">
          <label for="inputPassword">Contraseña * <span style="color:var(--eco-muted);font-weight:400;">(mín. 8 caracteres)</span></label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="inputPassword" placeholder="Contraseña segura" />
            <button type="button" class="toggle-pass" onclick="togglePass('inputPassword',this)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="inputTipo">Tipo de usuario *</label>
            <select id="inputTipo">
              <option value="">Selecciona...</option>
              <option value="vendedor">Vendedor</option>
              <option value="comprador">Comprador</option>
              <option value="centro">Centro de reciclaje</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <div class="form-field">
            <label for="inputCiudad">Ciudad / Municipio</label>
            <select id="inputCiudad">
              <option value="">Selecciona...</option>
              <option value="Rioverde">★ Rioverde (Sede Principal)</option>
              <option value="San Luis Potosí">San Luis Potosí</option>
              <option value="Soledad de Graciano Sánchez">Soledad de Graciano Sánchez</option>
              <option value="Ciudad Valles">Ciudad Valles</option>
              <option value="Matehuala">Matehuala</option>
              <option value="Tamazunchale">Tamazunchale</option>
              <option value="Ciudad Fernández">Ciudad Fernández</option>
              <option value="Cerritos">Cerritos</option>
              <option value="Cedral">Cedral</option>
              <option value="Charcas">Charcas</option>
              <option value="Venado">Venado</option>
              <option value="Otro municipio SLP">Otro municipio SLP</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn-full" id="btnGuardar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          Crear usuario
        </button>

      </form>
    </div>
  </div>

  <script src="js/usuarios-registrar.js"></script>
</body>
</html>
