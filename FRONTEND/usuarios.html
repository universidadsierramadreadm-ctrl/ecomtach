<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECOMATCH — Usuarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <div class="logo-icon">
          <a href="inicio.html"><img src="assets/images/logo.png" alt="ECOMATCH" height="52" /></a>
        </div>
      </div>
      <div class="module-nav">
        <span class="module-nav-user">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="nombreNav"></span>
        </span>
        <button class="btn-nav-logout" onclick="cerrarSesion()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Salir
        </button>
      </div>
    </div>
  </nav>

  <div class="page-wrap">

    <a href="inicio.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Panel de inicio
    </a>

    <div class="page-header">
      <div>
        <h1 class="page-title">Usuarios</h1>
        <p style="color:var(--eco-muted);font-size:13px;margin-top:3px;">Gestión de usuarios — San Luis Potosí</p>
      </div>
      <a href="usuarios-registrar.html" class="btn-primary-sm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo usuario
      </a>
    </div>

    <div class="admin-notice">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Las acciones de editar, crear y eliminar requieren una cuenta con rol <strong>admin</strong>.
    </div>

    <div id="alerta" class="alerta"></div>

    <div class="search-bar">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="buscador" placeholder="Buscar por nombre o correo electrónico..." oninput="buscar()" />
    </div>

    <div class="table-wrap">
      <div id="spinnerWrap" class="spinner-wrap">
        <div class="spinner"></div>
        <p>Cargando usuarios...</p>
      </div>
      <div id="tablaWrap" style="display:none;" class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Tipo</th>
              <th>VIP</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaBody"></tbody>
        </table>
        <div id="sinResultados" class="empty-msg" style="display:none;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;display:block;opacity:.3"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          Sin resultados para esa búsqueda.
        </div>
      </div>
    </div>

  </div>

  <script src="js/usuarios.js"></script>
</body>
</html>
