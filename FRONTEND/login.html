<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECOMATCH — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <div class="logo-icon">
          <a href="index.html"><img src="assets/images/logo.png" alt="ECOMATCH" height="52" /></a>
        </div>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-box">

      <div class="auth-logo">
        <img src="assets/images/logo.png" alt="ECOMATCH" />
        <div class="sede-tag" style="justify-content:center;margin-top:10px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Rioverde, San Luis Potosí
        </div>
      </div>

      <h2 class="auth-title">Iniciar Sesión</h2>
      <p class="auth-sub">Ingresa tus credenciales para continuar</p>

      <div id="alerta" class="alerta"></div>

      <form onsubmit="event.preventDefault(); login()">
        <div class="form-field">
          <label for="inputEmail">Correo electrónico</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="inputEmail" placeholder="correo@empresa.com" autofocus autocomplete="email" />
          </div>
        </div>

        <div class="form-field">
          <label for="inputPassword">Contraseña</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="inputPassword" placeholder="Tu contraseña" autocomplete="current-password" />
            <button type="button" class="toggle-pass" onclick="togglePass('inputPassword', this)" title="Mostrar/ocultar">
              <svg id="eyeLogin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-full" id="btnLogin">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Ingresar
        </button>
      </form>

      <div class="auth-divider">o</div>

      <p class="auth-link">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
      <p class="auth-link" style="margin-top:10px;"><a href="index.html">← Volver al inicio</a></p>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
